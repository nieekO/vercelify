name: CI

# Runs on PRs (the commit that will be merged) and on direct pushes to main.
# Pushing to a PR branch triggers only pull_request — never both events for the same commit.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

# Cancel superseded runs for the same PR / branch so we don't waste runners.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ─── Backend Tests ────────────────────────────────────────────────────────
  backend-tests:
    name: "Tests — Backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET: test-jwt-secret-32-chars-minimum!!
      DASHBOARD_PASSWORD: test-password
      COOLIFY_API_URL: http://localhost/api/v1
      COOLIFY_API_TOKEN: test-token
      COOLIFY_APPS_SERVER_UUID: apps-server
      COOLIFY_INFRA_SERVER_UUID: infra-server
      COOLIFY_DEFAULT_PROJECT_UUID: default-project
      DATA_PATH: /tmp/test-projects.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests with coverage
        run: npx jest --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: backend/coverage/
          if-no-files-found: ignore

  # ─── Frontend Tests ───────────────────────────────────────────────────────
  frontend-tests:
    name: "Tests — Frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: frontend/coverage/
          if-no-files-found: ignore

  # ─── TypeScript ───────────────────────────────────────────────────────────
  typecheck:
    name: "TypeScript"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend — install & typecheck
        working-directory: backend
        run: npm ci && npx tsc --noEmit
      - name: Frontend — install & typecheck
        working-directory: frontend
        run: npm ci && npx tsc --noEmit

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: "Build"
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend — install & build
        working-directory: backend
        run: npm ci && npm run build && test -f dist/index.js
      - name: Frontend — install & build
        working-directory: frontend
        run: npm ci && npm run build && test -f dist/index.html

  # ─── Docker ───────────────────────────────────────────────────────────────
  docker:
    name: "Docker"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vercelify:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify image
        run: docker image inspect vercelify:test
