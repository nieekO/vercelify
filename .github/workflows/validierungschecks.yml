name: Validierungschecks

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

defaults:
  run:
    shell: bash

jobs:
  # ─── TypeScript: Backend ──────────────────────────────────────────────────────
  typescript-backend:
    name: "TypeScript — Backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: NODE_ENV=development npm install
      - name: TypeScript strict check
        run: npx tsc --noEmit

  # ─── TypeScript: Frontend ─────────────────────────────────────────────────────
  typescript-frontend:
    name: "TypeScript — Frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: NODE_ENV=development npm install
      - name: TypeScript strict check
        run: npx tsc --noEmit

  # ─── Build: Backend ───────────────────────────────────────────────────────────
  build-backend:
    name: "Build — Backend"
    runs-on: ubuntu-latest
    needs: typescript-backend
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: NODE_ENV=development npm install
      - name: Build backend
        run: npm run build
      - name: Verify dist output
        run: test -f dist/index.js && echo "✓ dist/index.js exists"
      - uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

  # ─── Build: Frontend ──────────────────────────────────────────────────────────
  build-frontend:
    name: "Build — Frontend (Vite)"
    runs-on: ubuntu-latest
    needs: typescript-frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: NODE_ENV=development npm install
      - name: Build frontend
        run: npm run build
      - name: Verify dist output
        run: test -f dist/index.html && echo "✓ dist/index.html exists"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─── Docker Build ─────────────────────────────────────────────────────────────
  docker-build:
    name: "Docker — Multi-Stage Build"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vercelify:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify image was built
        run: docker image inspect vercelify:test

  # ─── Security Audit: Backend ─────────────────────────────────────────────────
  security-audit-backend:
    name: "Security Audit — Backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: NODE_ENV=development npm install
      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Audit report (JSON)
        run: npm audit --json > audit-backend.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-backend
          path: backend/audit-backend.json

  # ─── Security Audit: Frontend ────────────────────────────────────────────────
  security-audit-frontend:
    name: "Security Audit — Frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: NODE_ENV=development npm install
      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Audit report (JSON)
        run: npm audit --json > audit-frontend.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-frontend
          path: frontend/audit-frontend.json

  # ─── Dependency Check ────────────────────────────────────────────────────────
  dependency-check:
    name: "Abhängigkeiten — Outdated Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check backend outdated packages
        working-directory: backend
        run: npm outdated || true
      - name: Check frontend outdated packages
        working-directory: frontend
        run: npm outdated || true

  # ─── Package Lock Consistency ────────────────────────────────────────────────
  lockfile-check:
    name: "Lockfile — Konsistenzprüfung"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify backend lockfile is up to date
        working-directory: backend
        run: npm ci --dry-run 2>&1 | head -5 || npm install --dry-run
      - name: Verify frontend lockfile is up to date
        working-directory: frontend
        run: npm ci --dry-run 2>&1 | head -5 || npm install --dry-run
